user root;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;

    # uvicorn (FastAPI) — same host, internal port.
    upstream api {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name _;

        # Hashed Vite build assets — fingerprinted, so cache hard & immutable.
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Frontend SPA. index.html stays uncached so new asset hashes are picked up.
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # JSON API + Spotify OAuth (/login, /callback) — all proxied to uvicorn so the
        # whole app, including the OAuth redirect flow, stays on this single origin.
        location /api/      { proxy_pass http://api; proxy_http_version 1.1;
                              proxy_set_header Host $host;
                              proxy_set_header X-Real-IP $remote_addr;
                              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                              proxy_set_header X-Forwarded-Proto $scheme;
                              # Playlist builds (LLM + many searches) can run >60s; the
                              # default proxy_read_timeout would cut them off mid-flight.
                              proxy_connect_timeout 10s;
                              proxy_send_timeout 300s;
                              proxy_read_timeout 300s; }
        location = /login    { proxy_pass http://api; proxy_set_header Host $host;
                              proxy_set_header X-Forwarded-Proto $scheme; }
        location = /callback { proxy_pass http://api; proxy_set_header Host $host;
                              proxy_set_header X-Forwarded-Proto $scheme; }
        # Dev-only login bypass; backend mounts it only when DEV_AUTH is on (404 otherwise).
        location = /dev/login { proxy_pass http://api; proxy_set_header Host $host;
                              proxy_set_header X-Forwarded-Proto $scheme; }

        # Container health check (nginx liveness, no backend dependency).
        location = /healthz {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
