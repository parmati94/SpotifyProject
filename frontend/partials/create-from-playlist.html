<!-- Create a new playlist — two modes sharing one card so they take no extra vertical
     space: seed from an existing playlist, or describe a free-text "vibe" (LLM-only).
     The mode toggle (and the whole vibe mode) only appears when an LLM is configured. -->
<section id="create-from-playlist" class="rounded-2xl border border-gray-800 bg-gray-900/60 p-6">
  <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
    <div class="flex items-center gap-2.5">
      <svg class="w-5 h-5 text-accent-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      <h2 class="font-display text-lg font-bold">Create a playlist</h2>
    </div>
    <!-- Segmented mode toggle — hidden entirely when no LLM is available for vibe mode. -->
    <div x-show="vibe.available.length" class="inline-flex rounded-lg border border-gray-800 bg-gray-950 p-1">
      <button @click="createMode = 'playlist'" class="px-3 py-1.5 text-sm rounded-md transition-colors"
              :class="createMode === 'playlist' ? 'bg-accent-500 text-gray-950 font-medium' : 'text-gray-400 hover:text-white'">From a playlist</button>
      <button @click="createMode = 'vibe'" class="px-3 py-1.5 text-sm rounded-md transition-colors"
              :class="createMode === 'vibe' ? 'bg-accent-500 text-gray-950 font-medium' : 'text-gray-400 hover:text-white'">From a vibe</button>
    </div>
  </div>

  <!-- ── Mode: from a playlist ──────────────────────────────────────────── -->
  <div x-show="createMode === 'playlist'">
  <p class="text-sm text-gray-400 mb-5">Pick a playlist to seed from, name the new one, and choose how many songs to generate.</p>

  <div class="grid gap-4 sm:grid-cols-2">
    <!-- Source: custom searchable dropdown (kept in sync with the grid below) -->
    <div class="block">
      <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">Seed from</span>
      <div class="relative mt-1.5" @click.outside="sourceDropdownOpen = false" @keydown.escape.window="sourceDropdownOpen = false">
        <!-- Fixed-height trigger (matches the name input's h-12). Art when selected, no
             placeholder icon. -->
        <button type="button" @click="sourceDropdownOpen = !sourceDropdownOpen"
                class="w-full flex items-center gap-2.5 bg-gray-950 border rounded-lg px-3 h-12 text-sm text-left transition-colors"
                :class="sourceDropdownOpen ? 'border-accent-500 ring-2 ring-accent-500/50' : 'border-gray-700 hover:border-gray-600'">
          <img x-show="selectedSourcePlaylist()" :src="selectedSourcePlaylist()?.image_url" alt=""
               class="w-8 h-8 rounded object-cover flex-shrink-0" />
          <span class="flex-1 min-w-0 truncate" :class="selectedSourcePlaylist() ? 'text-white' : 'text-gray-500'"
                x-text="selectedSourcePlaylist()?.name || 'Select a playlist…'"></span>
          <svg class="w-4 h-4 text-gray-500 flex-shrink-0 transition-transform" :class="sourceDropdownOpen ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>

        <div x-show="sourceDropdownOpen" x-transition.opacity.duration.100ms x-cloak
             class="absolute z-30 mt-1 w-full rounded-lg border border-gray-700 bg-gray-900 shadow-2xl overflow-hidden">
          <div class="p-2 border-b border-gray-800">
            <input x-model="sourceSearch" type="text" placeholder="Search playlists…" @click.stop
                   class="w-full bg-gray-950 border border-gray-700 rounded-md px-3 py-1.5 text-sm placeholder:text-gray-600 focus:outline-none focus:ring-1 focus:ring-accent-500" />
          </div>
          <div class="max-h-64 overflow-y-auto py-1">
            <template x-for="p in sourceOptions()" :key="p.name">
              <button type="button" @click="selectSource(p.name)"
                      class="w-full flex items-center gap-2.5 px-2.5 py-1.5 text-left hover:bg-gray-800 transition-colors"
                      :class="createForm.source === p.name ? 'bg-accent-500/10' : ''">
                <img :src="p.image_url" alt="" loading="lazy" class="w-8 h-8 rounded object-cover flex-shrink-0" />
                <span class="flex-1 min-w-0">
                  <span class="flex items-center gap-1.5">
                    <span class="truncate text-sm text-white" x-text="p.name"></span>
                    <span x-show="p.recently_played" class="flex-shrink-0 w-1.5 h-1.5 rounded-full bg-accent-400" title="Recently played"></span>
                  </span>
                  <span class="block text-xs text-gray-500" x-text="`${p.total_tracks} tracks`"></span>
                </span>
                <svg x-show="createForm.source === p.name" class="w-4 h-4 text-accent-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
              </button>
            </template>
            <div x-show="!sourceOptions().length" class="px-3 py-4 text-center text-sm text-gray-600">No matches</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Target name -->
    <label class="block">
      <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">New playlist name</span>
      <input x-model="createForm.target" type="text" placeholder="e.g. Discovery Mix"
             class="mt-1.5 w-full bg-gray-950 border border-gray-700 rounded-lg px-3 h-12 text-sm placeholder:text-gray-600 focus:outline-none focus:ring-2 focus:ring-accent-500/60 focus:border-accent-500" />
    </label>
  </div>

  <!-- Count slider -->
  <div class="mt-5">
    <div class="flex items-center justify-between">
      <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">Songs</span>
      <span class="text-sm font-semibold text-accent-400" x-text="createForm.count"></span>
    </div>
    <input x-model.number="createForm.count" type="range" min="20" max="200" step="10"
           class="mt-2 w-full accent-accent-500" />
    <div class="flex justify-between text-[11px] text-gray-600 mt-1"><span>20</span><span>200</span></div>
  </div>

  <button @click="createFromPlaylist()" :disabled="actionLoading"
          class="mt-6 inline-flex items-center justify-center gap-2 bg-accent-500 hover:bg-accent-400 disabled:opacity-50 disabled:cursor-not-allowed text-gray-950 font-medium rounded-lg px-5 py-2.5 transition-colors">
    <svg x-show="busy === 'from'" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
    <span x-text="busy === 'from' ? 'Building…' : 'Create playlist'"></span>
  </button>
  </div>

  <!-- ── Mode: from a vibe (free text → LLM) ────────────────────────────── -->
  <div x-show="createMode === 'vibe'" x-cloak>
    <p class="text-sm text-gray-400 mb-3">Describe the playlist you want in plain words — an LLM picks songs to match, every one verified on Spotify.</p>

    <textarea x-model="vibeForm.description" rows="2" maxlength="300"
              placeholder="e.g. rainy sunday coffee-shop jazz · upbeat 2000s indie for a workout"
              class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2.5 text-sm placeholder:text-gray-600 focus:outline-none focus:ring-2 focus:ring-accent-500/60 focus:border-accent-500 resize-none"></textarea>

    <!-- Engine picker (only when >1 LLM keyed) + AI-naming toggle, on one row. -->
    <div class="mt-4 flex flex-wrap items-center gap-x-6 gap-y-3">
      <div x-show="vibe.available.length > 1" class="flex items-center gap-2">
        <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">Engine</span>
        <div class="inline-flex rounded-lg border border-gray-800 bg-gray-950 p-1">
          <template x-for="e in vibe.available" :key="e.id">
            <button @click="selectVibeEngine(e.id)" class="px-2.5 py-1 text-xs rounded-md transition-colors"
                    :class="vibe.active === e.id ? 'bg-accent-500 text-gray-950 font-medium' : 'text-gray-400 hover:text-white'"
                    x-text="e.label"></button>
          </template>
        </div>
      </div>
      <label class="inline-flex items-center gap-2 cursor-pointer select-none">
        <input type="checkbox" x-model="vibeForm.nameIt" class="w-4 h-4 rounded accent-accent-500" />
        <span class="text-sm text-gray-300">Let AI name &amp; describe it</span>
      </label>
    </div>

    <!-- Model sub-selector: slides in below the engine box and repopulates for the active
         engine; only shown when that engine offers more than one model. -->
    <div x-show="modelsOf(vibe.available, vibe.active).length > 1" x-cloak
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-1"
         x-transition:enter-end="opacity-100 translate-y-0"
         class="mt-4">
      <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">Model</span>
      <div class="mt-1.5 flex flex-wrap gap-1.5">
        <template x-for="m in modelsOf(vibe.available, vibe.active)" :key="m">
          <button @click="selectVibeModel(m)" class="px-2.5 py-1 text-xs rounded-md border transition-colors"
                  :class="vibe.activeModel === m ? 'border-accent-500 bg-accent-500/10 text-white' : 'border-gray-700 text-gray-400 hover:border-gray-500'"
                  x-text="prettyModel(m)"></button>
        </template>
      </div>
    </div>

    <!-- Count slider -->
    <div class="mt-5">
      <div class="flex items-center justify-between">
        <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">Songs</span>
        <span class="text-sm font-semibold text-accent-400" x-text="vibeForm.count"></span>
      </div>
      <input x-model.number="vibeForm.count" type="range" min="20" max="200" step="10"
             class="mt-2 w-full accent-accent-500" />
      <div class="flex justify-between text-[11px] text-gray-600 mt-1"><span>20</span><span>200</span></div>
    </div>

    <button @click="createVibe()" :disabled="actionLoading"
            class="mt-6 inline-flex items-center justify-center gap-2 bg-accent-500 hover:bg-accent-400 disabled:opacity-50 disabled:cursor-not-allowed text-gray-950 font-medium rounded-lg px-5 py-2.5 transition-colors">
      <svg x-show="busy === 'vibe'" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
      <span x-text="busy === 'vibe' ? 'Conjuring…' : 'Generate'"></span>
    </button>
  </div>
</section>
