<!-- The user's playlists as a searchable card grid. "Use as source" fills the
     create form above. -->
<section>
  <div class="flex items-center justify-between gap-3 mb-4">
    <div class="flex items-baseline gap-2.5">
      <h2 class="font-display text-lg font-bold">Your playlists</h2>
      <span class="text-sm text-gray-500" x-show="playlists.length"
            x-text="`${playlists.length} · ${totalTracks().toLocaleString()} tracks`"></span>
    </div>
    <div class="relative" x-show="playlists.length">
      <svg class="w-4 h-4 text-gray-500 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
      <input x-model="playlistSearch" type="text" placeholder="Search…"
             class="w-40 sm:w-56 bg-gray-900 border border-gray-700 rounded-lg pl-9 pr-3 py-2 text-sm placeholder:text-gray-600 focus:outline-none focus:ring-2 focus:ring-accent-500/60 focus:border-accent-500" />
    </div>
  </div>

  <!-- Loading skeleton -->
  <div x-show="playlistsLoading" class="grid gap-3 grid-cols-2 sm:grid-cols-3 lg:grid-cols-4">
    <template x-for="i in 8" :key="i">
      <div class="rounded-xl border border-gray-800 bg-gray-900/60 p-3 animate-pulse">
        <div class="aspect-square rounded-lg bg-gray-800"></div>
        <div class="h-3 bg-gray-800 rounded mt-3 w-3/4"></div>
        <div class="h-2.5 bg-gray-800/70 rounded mt-2 w-1/3"></div>
      </div>
    </template>
  </div>

  <!-- Empty -->
  <div x-show="!playlistsLoading && !playlists.length" class="rounded-2xl border border-dashed border-gray-800 bg-gray-900/30 p-10 text-center text-gray-500">
    No playlists found in your library yet.
  </div>

  <!-- Grid -->
  <div x-show="!playlistsLoading && playlists.length" class="grid gap-3 grid-cols-2 sm:grid-cols-3 lg:grid-cols-4">
    <template x-for="p in filteredPlaylists()" :key="p.name">
      <div class="group relative rounded-xl border border-gray-800 bg-gray-900/60 p-3 hover:border-gray-700 hover:bg-gray-900 transition-colors">
        <div class="aspect-square rounded-lg overflow-hidden bg-gray-800">
          <img :src="p.image_url" :alt="p.name" loading="lazy" class="w-full h-full object-cover" />
        </div>
        <p class="mt-2.5 text-sm font-medium text-white truncate" x-text="p.name" :title="p.name"></p>
        <p class="text-xs text-gray-500" x-text="`${p.total_tracks} tracks`"></p>
        <button @click="useAsSource(p.name)" title="Use as seed for a new playlist"
                class="absolute top-2 right-2 grid place-items-center w-8 h-8 rounded-lg bg-gray-950/80 text-accent-400 opacity-0 group-hover:opacity-100 focus:opacity-100 hover:bg-accent-500 hover:text-gray-950 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        </button>
      </div>
    </template>
  </div>
</section>
