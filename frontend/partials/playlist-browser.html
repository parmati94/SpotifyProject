<!-- The user's playlists as a searchable card grid, recently-played first.
     Clicking a card selects it as the "create from a playlist" source (synced with
     the dropdown above). -->
<section>
  <div class="flex items-center justify-between gap-3 mb-4">
    <div class="flex items-baseline gap-2.5">
      <h2 class="font-display text-lg font-bold">Your playlists</h2>
      <span class="text-sm text-gray-500" x-show="playlists.length"
            x-text="`${playlists.length} · ${totalTracks().toLocaleString()} tracks`"></span>
    </div>
    <div class="relative" x-show="playlists.length">
      <svg class="w-4 h-4 text-gray-500 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
      <input x-model="playlistSearch" type="text" placeholder="Search…"
             class="w-40 sm:w-56 bg-gray-900 border border-gray-700 rounded-lg pl-9 pr-3 py-2 text-sm placeholder:text-gray-600 focus:outline-none focus:ring-2 focus:ring-accent-500/60 focus:border-accent-500" />
    </div>
  </div>

  <!-- Tabs: Spotify-style filter chips. The active chip uses the app accent (matching the
       playlist-card selection state); the others stay quiet until hovered. -->
  <div x-show="playlists.length && !playlistsLoading" class="flex items-center gap-2 mb-5">
    <template x-for="tab in [{ id: 'library', label: 'Your library' }, { id: 'app', label: 'Made here' }]" :key="tab.id">
      <button @click="playlistTab = tab.id" type="button"
              class="px-4 py-1.5 rounded-full text-sm transition-all duration-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-accent-500/60"
              :class="playlistTab === tab.id
                ? 'bg-accent-500 text-gray-950 font-semibold shadow-sm shadow-accent-500/30'
                : 'bg-gray-800/80 text-gray-300 font-medium hover:bg-gray-700 hover:text-white'">
        <span x-text="tab.label"></span>
        <span class="ml-1 tabular-nums"
              :class="playlistTab === tab.id ? 'text-gray-950/60' : 'text-gray-500'"
              x-text="tabCount(tab.id)"></span>
      </button>
    </template>
  </div>

  <!-- Loading skeleton -->
  <div x-show="playlistsLoading" class="grid gap-3 grid-cols-2 sm:grid-cols-3 lg:grid-cols-4">
    <template x-for="i in 8" :key="i">
      <div class="rounded-xl border border-gray-800 bg-gray-900/60 p-3 animate-pulse">
        <div class="aspect-square rounded-lg bg-gray-800"></div>
        <div class="h-3 bg-gray-800 rounded mt-3 w-3/4"></div>
        <div class="h-2.5 bg-gray-800/70 rounded mt-2 w-1/3"></div>
      </div>
    </template>
  </div>

  <!-- Empty: no playlists at all -->
  <div x-show="!playlistsLoading && !playlists.length" class="rounded-2xl border border-dashed border-gray-800 bg-gray-900/30 p-10 text-center text-gray-500">
    No playlists found in your library yet.
  </div>

  <!-- Empty: have playlists, but none in the active tab / matching the search -->
  <div x-show="!playlistsLoading && playlists.length && !filteredPlaylists().length"
       class="rounded-2xl border border-dashed border-gray-800 bg-gray-900/30 p-10 text-center text-gray-500">
    <span x-show="playlistSearch.trim()">No playlists match your search.</span>
    <span x-show="!playlistSearch.trim() && playlistTab === 'app'">No app-made playlists yet — create a daily or weekly mix above.</span>
    <span x-show="!playlistSearch.trim() && playlistTab === 'library'">No playlists in your library.</span>
  </div>

  <!-- Grid -->
  <div x-show="!playlistsLoading && filteredPlaylists().length" class="grid gap-3 grid-cols-2 sm:grid-cols-3 lg:grid-cols-4">
    <template x-for="p in filteredPlaylists()" :key="p.name">
      <div @click="selectSource(p.name, { scroll: true })" @keydown.enter="selectSource(p.name, { scroll: true })"
           role="button" tabindex="0" :title="`Use ${p.name} as the source`"
           class="group relative rounded-xl border bg-gray-900/60 p-3 cursor-pointer transition-colors focus:outline-none"
           :class="createForm.source === p.name
             ? 'border-accent-500 ring-2 ring-accent-500/50 bg-gray-900'
             : 'border-gray-800 hover:border-gray-700 hover:bg-gray-900'">
        <div class="aspect-square rounded-lg overflow-hidden bg-gray-800">
          <img :src="p.image_url" :alt="p.name" loading="lazy" class="w-full h-full object-cover" />
        </div>
        <!-- Recently-played badge -->
        <span x-show="p.recently_played"
              class="absolute top-2 left-2 inline-flex items-center gap-1 rounded-full bg-gray-950/80 backdrop-blur-sm border border-accent-700/50 px-2 py-0.5 text-[10px] font-medium text-accent-300">
          <span class="w-1.5 h-1.5 rounded-full bg-accent-400"></span> Recent
        </span>
        <!-- Selected check -->
        <span x-show="createForm.source === p.name"
              class="absolute top-2 right-2 grid place-items-center w-7 h-7 rounded-lg bg-accent-500 text-gray-950 shadow-lg">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
        </span>
        <p class="mt-2.5 text-sm font-medium text-white truncate" x-text="p.name" :title="p.name"></p>
        <p class="text-xs text-gray-500" x-text="`${p.total_tracks} tracks`"></p>
      </div>
    </template>
  </div>
</section>
