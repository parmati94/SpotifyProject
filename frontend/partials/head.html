<!DOCTYPE html>
<html lang="en" data-theme="spotify">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpotifyProject</title>
  <meta name="theme-color" content="#0f1420" />
  <!-- SVG favicon (crisp in desktop tabs); PNGs below cover the surfaces that
       ignore SVG — iOS home screen (apple-touch-icon) and link-preview scrapers. -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231db954'%3E%3Crect x='3' y='13' width='3' height='7' rx='1.5'/%3E%3Crect x='8' y='9' width='3' height='11' rx='1.5'/%3E%3Crect x='13' y='11' width='3' height='9' rx='1.5'/%3E%3Cpath d='M19 3.1c.2 1.65.95 2.4 2.6 2.6-1.65.2-2.4.95-2.6 2.6-.2-1.65-.95-2.4-2.6-2.6 1.65-.2 2.4-.95 2.6-2.6z'/%3E%3C/svg%3E" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <!-- ?v=2 = a URL iOS's WebClip icon cache has never seen, forcing a fresh fetch
       (the file itself is unchanged at /apple-touch-icon.png). -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <!-- Open Graph / Twitter so texted links and shares show the icon, not a blank. -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="SpotifyProject" />
  <meta property="og:description" content="AI-generated Spotify playlists — daily/weekly mixes and playlists built from any of yours, with AI recommendations." />
  <meta property="og:url" content="https://spotifyproject.parmati.me/" />
  <meta property="og:image" content="https://spotifyproject.parmati.me/icon-512.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="SpotifyProject" />
  <meta name="twitter:image" content="https://spotifyproject.parmati.me/icon-512.png" />
  <link rel="stylesheet" href="/css/main.css" />
  <script type="module" src="/js/app.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">
<!-- Alpine v3 auto-calls init() on the component — no x-init needed. -->
<div id="app" x-data="app" x-cloak class="flex flex-col min-h-screen">
